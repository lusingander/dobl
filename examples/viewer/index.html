<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dobl Summary Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-muted: #eef1f5;
      --text: #18202b;
      --muted: #687385;
      --line: #d9dee7;
      --line-strong: #b9c2d0;
      --focus: #1769aa;
      --done: #1f7a4d;
      --cached: #6f5db7;
      --error: #b3261e;
      --canceled: #6f3b16;
      --warning: #b26b00;
      --progress: #1f6f8b;
      --dockerfile: #1769aa;
      --dockerfile-tint: #d9ebf7;
      --internal: #4d6278;
      --internal-tint: #e2e8ef;
      --export: #1f7a4d;
      --export-tint: #ddefe6;
      --cache: #6f5db7;
      --cache-tint: #e8e3f6;
      --provenance: #8a5a16;
      --provenance-tint: #f2e5ce;
      --other: #687385;
      --other-tint: #e6e9ee;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      margin: 0;
      height: 100vh;
      height: 100dvh;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.45;
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button,
    .file-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      padding: 0 12px;
      white-space: nowrap;
    }

    button:hover,
    .file-button:hover {
      border-color: var(--focus);
    }

    button:focus-visible,
    .file-button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    button:disabled {
      cursor: default;
      opacity: 0.5;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 249, 0.96);
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 14px 20px;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .mark {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--panel);
      color: var(--focus);
      font-family: var(--mono);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .source-name {
      margin-top: 3px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 60vw;
      font-size: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .mode-button[aria-pressed="true"] {
      border-color: var(--focus);
      background: #e6f1fb;
      color: var(--focus);
      font-weight: 700;
    }

    #file-input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      clip-path: inset(50%);
      overflow: hidden;
      white-space: nowrap;
    }

    main {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 14px;
      width: min(1440px, 100%);
      min-height: 0;
      margin: 0 auto;
      padding: 18px 20px 24px;
      overflow: hidden;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
    }

    .metric {
      min-height: 74px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
    }

    .metric-value {
      margin-top: 6px;
      font-size: 24px;
      line-height: 1;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(340px, 0.9fr) minmax(0, 1.55fr);
      gap: 14px;
      align-items: stretch;
      min-height: 0;
      overflow: hidden;
    }

    .panel {
      min-width: 0;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .steps-panel {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      height: 100%;
      max-height: 100%;
    }

    .panel-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 54px;
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
    }

    .panel-title {
      font-weight: 700;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 132px 132px;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .filters input,
    .filters select {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
    }

    .step-list {
      min-height: 0;
      overflow: auto;
      padding: 8px;
    }

    .step-card {
      display: grid;
      grid-template-columns: 8px minmax(0, 1fr);
      gap: 10px;
      width: 100%;
      min-height: 78px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      margin: 0 0 8px;
      padding: 0;
      text-align: left;
    }

    .dense .metric {
      min-height: 58px;
      padding: 9px 10px;
    }

    .dense .metric-value {
      margin-top: 4px;
      font-size: 20px;
    }

    .dense .step-card {
      min-height: 52px;
      gap: 8px;
      margin-bottom: 6px;
    }

    .dense .step-card-body {
      padding: 7px 10px 7px 0;
    }

    .dense .step-meta {
      margin-top: 4px;
    }

    .dense .detail {
      padding: 12px;
    }

    .dense .detail-grid {
      gap: 8px;
      margin-block: 10px;
    }

    .dense .field {
      min-height: 54px;
      padding: 8px;
    }

    .step-card[aria-selected="true"] {
      border-color: var(--focus);
      box-shadow: 0 0 0 1px var(--focus);
    }

    .step-stripe {
      border-radius: 7px 0 0 7px;
      background: var(--other);
    }

    .step-card-body {
      min-width: 0;
      padding: 10px 10px 10px 0;
    }

    .step-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .step-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }

    .step-meta {
      margin-top: 7px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border: 1px solid currentColor;
      border-radius: 999px;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .pill-muted {
      color: var(--muted);
    }

    .status-DONE { color: var(--done); }
    .status-CACHED { color: var(--cached); }
    .status-ERROR { color: var(--error); }
    .status-CANCELED { color: var(--canceled); }
    .status-WARNING { color: var(--warning); }
    .status-PROGRESS { color: var(--progress); }

    .category-dockerfile,
    .legend-swatch.category-dockerfile { background: var(--dockerfile); }
    .category-internal,
    .legend-swatch.category-internal { background: var(--internal); }
    .category-export,
    .legend-swatch.category-export { background: var(--export); }
    .category-cache,
    .legend-swatch.category-cache { background: var(--cache); }
    .category-provenance,
    .legend-swatch.category-provenance { background: var(--provenance); }
    .category-other,
    .legend-swatch.category-other { background: var(--other); }

    .detail {
      height: 100%;
      max-height: 100%;
      min-height: 0;
      overflow: auto;
      padding: 16px;
    }

    .detail-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
    }

    .detail-title {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .detail-subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0;
    }

    .field {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-muted);
      padding: 10px;
      min-height: 64px;
    }

    .field-label {
      color: var(--muted);
      font-size: 12px;
    }

    .field-value {
      margin-top: 5px;
      overflow-wrap: anywhere;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
    }

    .timeline-panel {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(30px, 1fr));
      gap: 3px;
      min-height: 22px;
    }

    .timeline-segment {
      position: relative;
      min-height: 22px;
      border: 0;
      border-radius: 3px;
      background: var(--other);
      color: var(--muted);
      padding: 0;
      overflow: hidden;
    }

    .timeline-segment::after {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 4px;
      border-top: 2px solid var(--bg);
      background: currentColor;
      content: "";
    }

    .timeline-segment.category-dockerfile { background: var(--dockerfile-tint); }
    .timeline-segment.category-internal { background: var(--internal-tint); }
    .timeline-segment.category-export { background: var(--export-tint); }
    .timeline-segment.category-cache { background: var(--cache-tint); }
    .timeline-segment.category-provenance { background: var(--provenance-tint); }
    .timeline-segment.category-other { background: var(--other-tint); }

    .timeline-segment.status-DONE { color: var(--done); }
    .timeline-segment.status-CACHED { color: var(--cached); }
    .timeline-segment.status-ERROR { color: var(--error); }
    .timeline-segment.status-CANCELED { color: var(--canceled); }
    .timeline-segment.status-WARNING { color: var(--warning); }
    .timeline-segment.status-PROGRESS { color: var(--progress); }

    .timeline-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-group {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      align-items: center;
    }

    .legend-label {
      color: var(--text);
      font-weight: 700;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: var(--other);
    }

    .legend-line {
      width: 14px;
      height: 6px;
      border-top: 2px solid var(--bg);
      border-radius: 999px;
      background: currentColor;
    }

    .section {
      border-top: 1px solid var(--line);
      padding-top: 14px;
      margin-top: 14px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .section h3 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0;
    }

    .copy-button {
      min-height: 28px;
      padding: 0 9px;
      font-size: 12px;
    }

    .diagnostic {
      border-left: 4px solid var(--line-strong);
      background: var(--panel-muted);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-wrap: anywhere;
    }

    .diagnostic.error {
      border-left-color: var(--error);
    }

    .diagnostic.warning {
      border-left-color: var(--warning);
    }

    pre {
      margin: 0;
      max-height: 240px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111827;
      color: #f4f7fb;
      padding: 12px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .empty {
      display: grid;
      min-height: 320px;
      place-items: center;
      color: var(--muted);
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 980px) {
      .topbar,
      .workspace,
      .detail-header {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .step-list {
        max-height: none;
        min-height: 260px;
      }

      body {
        display: block;
        height: auto;
        min-height: 100vh;
        overflow: auto;
      }

      main {
        display: block;
        height: auto;
        overflow: visible;
      }

      .workspace {
        margin-top: 14px;
        overflow: visible;
      }

      .timeline-panel {
        margin-top: 14px;
      }

      .steps-panel,
      .detail {
        height: auto;
      }
    }

    @media (max-width: 640px) {
      .topbar,
      main {
        padding-inline: 12px;
      }

      .stats,
      .detail-grid,
      .filters {
        grid-template-columns: 1fr;
      }

      .metric {
        min-height: 62px;
      }

      .source-name {
        max-width: 86vw;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <div class="mark">D</div>
        <div>
          <h1>Dobl Summary Viewer</h1>
          <div class="source-name" id="source-name">No summary loaded</div>
        </div>
      </div>
      <div class="actions">
        <button class="mode-button" id="dense-button" type="button" aria-pressed="false">Dense</button>
        <label class="file-button" for="file-input">Open JSON</label>
        <input id="file-input" type="file" accept="application/json,.json">
        <button id="clear-button" type="button" disabled>Clear</button>
      </div>
    </div>
  </header>

  <main>
    <section class="stats" aria-label="Summary metrics">
      <div class="metric">
        <div class="metric-label">Steps</div>
        <div class="metric-value" id="metric-steps">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Done</div>
        <div class="metric-value" id="metric-done">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Cached</div>
        <div class="metric-value" id="metric-cached">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Warnings</div>
        <div class="metric-value" id="metric-warnings">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Errors</div>
        <div class="metric-value" id="metric-errors">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Outputs</div>
        <div class="metric-value" id="metric-outputs">0</div>
      </div>
    </section>

    <section class="workspace">
      <div class="panel steps-panel">
        <div class="panel-head">
          <div class="panel-title">Steps</div>
          <div class="pill pill-muted" id="visible-count">0 shown</div>
        </div>
        <div class="filters">
          <input id="search-input" type="search" placeholder="Search" autocomplete="off">
          <select id="status-filter" aria-label="Status">
            <option value="">Status</option>
            <option value="DONE">DONE</option>
            <option value="CACHED">CACHED</option>
            <option value="ERROR">ERROR</option>
            <option value="CANCELED">CANCELED</option>
            <option value="WARNING">WARNING</option>
            <option value="PROGRESS">PROGRESS</option>
          </select>
          <select id="category-filter" aria-label="Category">
            <option value="">Category</option>
            <option value="dockerfile">dockerfile</option>
            <option value="internal">internal</option>
            <option value="export">export</option>
            <option value="cache">cache</option>
            <option value="provenance">provenance</option>
            <option value="other">other</option>
          </select>
        </div>
        <div class="step-list" id="step-list"></div>
      </div>

      <div class="panel detail" id="detail-panel"></div>
    </section>
  </main>

  <script>
    const state = {
      steps: [],
      filtered: [],
      selectedID: "",
      sourceName: "",
      errorMessage: "",
      dense: false
    };

    const els = {
      fileInput: document.querySelector("#file-input"),
      denseButton: document.querySelector("#dense-button"),
      clearButton: document.querySelector("#clear-button"),
      sourceName: document.querySelector("#source-name"),
      searchInput: document.querySelector("#search-input"),
      statusFilter: document.querySelector("#status-filter"),
      categoryFilter: document.querySelector("#category-filter"),
      visibleCount: document.querySelector("#visible-count"),
      stepList: document.querySelector("#step-list"),
      detailPanel: document.querySelector("#detail-panel"),
      metrics: {
        steps: document.querySelector("#metric-steps"),
        done: document.querySelector("#metric-done"),
        cached: document.querySelector("#metric-cached"),
        warnings: document.querySelector("#metric-warnings"),
        errors: document.querySelector("#metric-errors"),
        outputs: document.querySelector("#metric-outputs")
      }
    };

    const statusValues = ["DONE", "CACHED", "ERROR", "CANCELED", "WARNING", "PROGRESS"];
    const categoryValues = ["dockerfile", "internal", "export", "cache", "provenance", "other"];

    els.fileInput.addEventListener("change", async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        loadSummary(JSON.parse(text), file.name);
      } catch (error) {
        showError(error, file.name);
      } finally {
        els.fileInput.value = "";
      }
    });

    els.clearButton.addEventListener("click", () => {
      loadSummary([], "");
    });

    els.denseButton.addEventListener("click", () => {
      setDenseMode(!state.dense);
    });

    els.searchInput.addEventListener("input", applyFilters);
    els.statusFilter.addEventListener("change", applyFilters);
    els.categoryFilter.addEventListener("change", applyFilters);

    window.addEventListener("dragover", (event) => {
      event.preventDefault();
    });

    window.addEventListener("drop", async (event) => {
      event.preventDefault();
      const file = event.dataTransfer.files && event.dataTransfer.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        loadSummary(JSON.parse(text), file.name);
      } catch (error) {
        showError(error, file.name);
      }
    });

    function loadSummary(value, sourceName) {
      validateSummary(value);

      state.steps = value.map(normalizeStep).sort((a, b) => a.order - b.order);
      state.selectedID = state.steps[0] ? state.steps[0].id : "";
      state.sourceName = sourceName || "";
      state.errorMessage = "";
      els.sourceName.textContent = state.sourceName || "No summary loaded";
      els.clearButton.disabled = state.steps.length === 0 && !state.errorMessage;
      renderMetrics();
      renderTimeline();
      applyFilters();
    }

    function setDenseMode(enabled) {
      state.dense = enabled;
      document.body.classList.toggle("dense", state.dense);
      els.denseButton.setAttribute("aria-pressed", state.dense ? "true" : "false");
    }

    function normalizeStep(step, index) {
      return {
        id: stringValue(step.id, "#" + (index + 1)),
        order: numberValue(step.order, index + 1),
        name: stringValue(step.name, ""),
        displayName: stringValue(step.display_name, step.name || ""),
        category: categoryValues.includes(step.category) ? step.category : "other",
        status: statusValues.includes(step.status) ? step.status : "",
        duration: stringValue(step.duration, ""),
        durationNanos: typeof step.duration_nanos === "number" ? step.duration_nanos : null,
        stage: stringValue(step.stage, ""),
        index: numberValue(step.index, 0),
        total: numberValue(step.total, 0),
        instruction: stringValue(step.instruction, ""),
        outputCount: numberValue(step.output_count, 0),
        outputTail: Array.isArray(step.output_tail) ? step.output_tail.map(String) : [],
        progressCount: numberValue(step.progress_count, 0),
        warningCount: numberValue(step.warning_count, 0),
        unknownCount: numberValue(step.unknown_count, 0),
        errorDetail: stringValue(step.error_detail, ""),
        warningDetail: stringValue(step.warning_detail, ""),
        startLine: numberValue(step.start_line, 0),
        endLine: numberValue(step.end_line, 0)
      };
    }

    function stringValue(value, fallback) {
      return typeof value === "string" ? value : fallback;
    }

    function numberValue(value, fallback) {
      return Number.isFinite(value) ? value : fallback;
    }

    function applyFilters() {
      const query = els.searchInput.value.trim().toLowerCase();
      const status = els.statusFilter.value;
      const category = els.categoryFilter.value;

      state.filtered = state.steps.filter((step) => {
        if (status && step.status !== status) return false;
        if (category && step.category !== category) return false;
        if (!query) return true;
        return [
          step.id,
          step.name,
          step.displayName,
          step.status,
          step.category,
          step.stage,
          step.instruction,
          step.errorDetail,
          step.warningDetail,
          step.outputTail.join("\n")
        ].join("\n").toLowerCase().includes(query);
      });

      if (!state.filtered.some((step) => step.id === state.selectedID)) {
        state.selectedID = state.filtered[0] ? state.filtered[0].id : "";
      }

      renderSteps();
      renderDetail();
    }

    function validateSummary(value) {
      if (!Array.isArray(value)) {
        throw new Error("Expected a summary JSON array.");
      }

      const required = [
        "id",
        "order",
        "category",
        "output_count",
        "progress_count",
        "warning_count",
        "unknown_count",
        "start_line",
        "end_line"
      ];
      for (let index = 0; index < value.length; index += 1) {
        const step = value[index];
        if (!step || typeof step !== "object" || Array.isArray(step)) {
          throw new Error("Summary item " + (index + 1) + " must be an object.");
        }
        for (const field of required) {
          if (!(field in step)) {
            throw new Error("Summary item " + (index + 1) + " is missing " + field + ".");
          }
        }
        if (typeof step.id !== "string" || !/^#[0-9]+$/.test(step.id)) {
          throw new Error("Summary item " + (index + 1) + " has an invalid id.");
        }
        if (!Number.isFinite(step.order)) {
          throw new Error("Summary item " + (index + 1) + " has an invalid order.");
        }
      }
    }

    function renderMetrics() {
      const totals = state.steps.reduce((acc, step) => {
        acc.steps += 1;
        acc.done += step.status === "DONE" ? 1 : 0;
        acc.cached += step.status === "CACHED" ? 1 : 0;
        acc.warnings += step.warningCount;
        acc.errors += step.status === "ERROR" ? 1 : 0;
        acc.outputs += step.outputCount;
        return acc;
      }, { steps: 0, done: 0, cached: 0, warnings: 0, errors: 0, outputs: 0 });

      els.metrics.steps.textContent = totals.steps;
      els.metrics.done.textContent = totals.done;
      els.metrics.cached.textContent = totals.cached;
      els.metrics.warnings.textContent = totals.warnings;
      els.metrics.errors.textContent = totals.errors;
      els.metrics.outputs.textContent = totals.outputs;
    }

    function renderTimeline() {
      const existing = document.querySelector(".timeline-panel");
      if (existing) existing.remove();
      if (!state.steps.length) return;

      const panel = document.createElement("div");
      panel.className = "timeline-panel";

      const timeline = document.createElement("div");
      timeline.className = "timeline";
      timeline.setAttribute("aria-label", "Step timeline");
      for (const step of state.steps) {
        const segment = document.createElement("button");
        segment.type = "button";
        segment.className = "timeline-segment category-" + step.category + " status-" + step.status;
        segment.dataset.stepId = step.id;
        segment.setAttribute("aria-current", step.id === state.selectedID ? "step" : "false");
        segment.tabIndex = step.id === state.selectedID ? 0 : -1;
        segment.title = step.id + " " + (step.displayName || step.name);
        segment.addEventListener("click", () => {
          selectStep(step.id, { scrollStepIntoView: true });
        });
        segment.addEventListener("keydown", handleTimelineKeydown);
        timeline.append(segment);
      }
      panel.append(timeline, timelineLegend());
      document.querySelector("main").insertBefore(panel, document.querySelector(".workspace"));
    }

    function timelineLegend() {
      const legend = document.createElement("div");
      legend.className = "timeline-legend";
      legend.setAttribute("aria-label", "Timeline legend");

      const categoryGroup = legendGroup("Category");
      for (const category of categoryValues) {
        const item = document.createElement("span");
        item.className = "legend-item";
        const swatch = document.createElement("span");
        swatch.className = "legend-swatch category-" + category;
        item.append(swatch, document.createTextNode(category));
        categoryGroup.append(item);
      }
      legend.append(categoryGroup);

      const statusGroup = legendGroup("Status");
      for (const status of statusValues) {
        const item = document.createElement("span");
        item.className = "legend-item status-" + status;
        const line = document.createElement("span");
        line.className = "legend-line";
        item.append(line, document.createTextNode(status));
        statusGroup.append(item);
      }
      legend.append(statusGroup);

      return legend;
    }

    function legendGroup(label) {
      const group = document.createElement("span");
      group.className = "legend-group";
      const title = document.createElement("span");
      title.className = "legend-label";
      title.textContent = label;
      group.append(title);
      return group;
    }

    function handleTimelineKeydown(event) {
      const id = stepIDFromKey(event, state.steps);
      if (!id) return;
      event.preventDefault();
      selectStep(id, { scrollStepIntoView: true, focusTimeline: true });
    }

    function handleStepKeydown(event) {
      const id = stepIDFromKey(event, state.filtered);
      if (!id) return;
      event.preventDefault();
      selectStep(id, { scrollStepIntoView: true, focusStep: true });
    }

    function stepIDFromKey(event, steps) {
      if (!steps.length) return "";

      const currentIndex = Math.max(0, steps.findIndex((step) => step.id === state.selectedID));
      switch (event.key) {
      case "ArrowDown":
      case "ArrowRight":
        return steps[Math.min(currentIndex + 1, steps.length - 1)].id;
      case "ArrowUp":
      case "ArrowLeft":
        return steps[Math.max(currentIndex - 1, 0)].id;
      case "Home":
        return steps[0].id;
      case "End":
        return steps[steps.length - 1].id;
      case "Enter":
      case " ":
        return state.selectedID;
      default:
        return "";
      }
    }

    function selectStep(id, options = {}) {
      state.selectedID = id;
      renderSteps({
        preserveScroll: options.preserveStepScroll === true,
        scrollSelectedIntoView: options.scrollStepIntoView === true
      });
      renderTimeline();
      renderDetail();
      if (options.focusStep === true) focusSelectedStep();
      if (options.focusTimeline === true) focusSelectedTimelineSegment();
    }

    function focusSelectedStep() {
      const selected = selectedStepElement();
      if (selected) selected.focus();
    }

    function focusSelectedTimelineSegment() {
      const selected = selectedTimelineSegment();
      if (selected) selected.focus();
    }

    function renderSteps(options = {}) {
      const previousScrollTop = options.preserveScroll ? els.stepList.scrollTop : 0;
      els.visibleCount.textContent = state.filtered.length + " shown";
      els.stepList.replaceChildren();

      if (!state.steps.length) {
        els.stepList.append(emptyNode(state.errorMessage ? "Invalid summary JSON" : "No summary loaded"));
        restoreStepListScroll(previousScrollTop, options);
        return;
      }
      if (!state.filtered.length) {
        els.stepList.append(emptyNode("No matching steps"));
        restoreStepListScroll(previousScrollTop, options);
        return;
      }

      for (const step of state.filtered) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "step-card";
        button.dataset.stepId = step.id;
        button.setAttribute("aria-selected", step.id === state.selectedID ? "true" : "false");
        button.tabIndex = step.id === state.selectedID ? 0 : -1;
        button.addEventListener("click", () => {
          selectStep(step.id, { preserveStepScroll: true });
        });
        button.addEventListener("keydown", handleStepKeydown);

        const stripe = document.createElement("span");
        stripe.className = "step-stripe category-" + step.category;
        button.append(stripe);

        const body = document.createElement("span");
        body.className = "step-card-body";

        const top = document.createElement("span");
        top.className = "step-row";
        top.append(pill(step.status || "UNKNOWN", "status-" + step.status));
        top.append(pill(step.category, "pill-muted"));
        const title = document.createElement("span");
        title.className = "step-title";
        title.textContent = step.displayName || step.name || step.id;
        top.append(title);

        const meta = document.createElement("span");
        meta.className = "step-meta";
        meta.textContent = compactMeta(step);

        body.append(top, meta);
        button.append(body);
        els.stepList.append(button);
      }
      restoreStepListScroll(previousScrollTop, options);
      scrollSelectedStepIntoView(options);
    }

    function restoreStepListScroll(previousScrollTop, options) {
      if (!options.preserveScroll) return;
      const maxScrollTop = Math.max(0, els.stepList.scrollHeight - els.stepList.clientHeight);
      els.stepList.scrollTop = Math.min(previousScrollTop, maxScrollTop);
    }

    function scrollSelectedStepIntoView(options) {
      if (!options.scrollSelectedIntoView) return;
      const selected = selectedStepElement();
      if (!selected) return;

      const listRect = els.stepList.getBoundingClientRect();
      const selectedRect = selected.getBoundingClientRect();
      const selectedTop = selectedRect.top - listRect.top + els.stepList.scrollTop;
      const targetTop = selectedTop - ((els.stepList.clientHeight - selectedRect.height) / 2);
      const maxScrollTop = Math.max(0, els.stepList.scrollHeight - els.stepList.clientHeight);
      els.stepList.scrollTop = Math.max(0, Math.min(targetTop, maxScrollTop));
    }

    function selectedStepElement() {
      return Array.from(els.stepList.children).find((child) => {
        return child.dataset && child.dataset.stepId === state.selectedID;
      });
    }

    function selectedTimelineSegment() {
      return document.querySelector('.timeline-segment[data-step-id="' + cssEscape(state.selectedID) + '"]');
    }

    function cssEscape(value) {
      if (window.CSS && typeof window.CSS.escape === "function") {
        return window.CSS.escape(value);
      }
      return String(value).replace(/"/g, '\\"');
    }

    function renderDetail() {
      els.detailPanel.replaceChildren();
      const step = state.steps.find((item) => item.id === state.selectedID);
      if (!step) {
        if (state.errorMessage) {
          els.detailPanel.append(section("Load Error", diagnostic(state.errorMessage, "error")));
        } else {
          els.detailPanel.append(emptyNode(state.steps.length ? "No step selected" : "No summary loaded"));
        }
        return;
      }

      const header = document.createElement("div");
      header.className = "detail-header";

      const titleWrap = document.createElement("div");
      const title = document.createElement("h2");
      title.className = "detail-title";
      title.textContent = step.displayName || step.name || step.id;
      const subtitle = document.createElement("div");
      subtitle.className = "detail-subtitle";
      subtitle.textContent = step.name || step.id;
      titleWrap.append(title, subtitle);

      const status = pill(step.status || "UNKNOWN", "status-" + step.status);
      header.append(titleWrap, status);

      const grid = document.createElement("div");
      grid.className = "detail-grid";
      grid.append(
        field("ID", step.id),
        field("Category", step.category),
        field("Duration", step.duration || "-"),
        field("Lines", lineRange(step)),
        field("Step", stepIndex(step) || "-"),
        field("Instruction", step.instruction || "-"),
        field("Outputs", String(step.outputCount)),
        field("Progress", String(step.progressCount))
      );

      els.detailPanel.append(header, grid);

      if (step.errorDetail) {
        els.detailPanel.append(section("Error", diagnostic(step.errorDetail, "error"), copyButton(step.errorDetail)));
      }
      if (step.warningDetail) {
        els.detailPanel.append(section("Warning", diagnostic(step.warningDetail, "warning"), copyButton(step.warningDetail)));
      }
      if (step.outputTail.length) {
        const outputText = step.outputTail.join("\n");
        const pre = document.createElement("pre");
        pre.textContent = outputText;
        els.detailPanel.append(section("Output Tail", pre, copyButton(outputText)));
      }
    }

    function compactMeta(step) {
      return [
        step.id,
        stepIndex(step),
        step.duration,
        lineRange(step)
      ].filter(Boolean).join("  ");
    }

    function stepIndex(step) {
      if (!step.index || !step.total) return "";
      return (step.stage ? step.stage + " " : "") + step.index + "/" + step.total;
    }

    function lineRange(step) {
      if (!step.startLine || !step.endLine) return "";
      return step.startLine === step.endLine ? "line " + step.startLine : "lines " + step.startLine + "-" + step.endLine;
    }

    function field(label, value) {
      const node = document.createElement("div");
      node.className = "field";
      const name = document.createElement("div");
      name.className = "field-label";
      name.textContent = label;
      const detail = document.createElement("div");
      detail.className = "field-value";
      detail.textContent = value;
      node.append(name, detail);
      return node;
    }

    function section(title, content, action) {
      const node = document.createElement("section");
      node.className = "section";
      const head = document.createElement("div");
      head.className = "section-head";
      const heading = document.createElement("h3");
      heading.textContent = title;
      head.append(heading);
      if (action) head.append(action);
      node.append(head, content);
      return node;
    }

    function copyButton(text) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "copy-button";
      button.textContent = "Copy";
      button.addEventListener("click", async () => {
        try {
          await copyText(text);
          button.textContent = "Copied";
        } catch (error) {
          button.textContent = "Failed";
        }
        window.setTimeout(() => {
          button.textContent = "Copy";
        }, 1200);
      });
      return button;
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const field = document.createElement("textarea");
      field.value = text;
      field.setAttribute("readonly", "");
      field.style.position = "fixed";
      field.style.top = "-1000px";
      document.body.append(field);
      field.select();
      document.execCommand("copy");
      field.remove();
    }

    function diagnostic(text, kind) {
      const node = document.createElement("div");
      node.className = "diagnostic " + kind;
      node.textContent = text;
      return node;
    }

    function pill(text, className) {
      const node = document.createElement("span");
      node.className = "pill " + className;
      node.textContent = text;
      return node;
    }

    function emptyNode(text) {
      const node = document.createElement("div");
      node.className = "empty";
      node.textContent = text;
      return node;
    }

    function showError(error, sourceName) {
      state.steps = [];
      state.filtered = [];
      state.selectedID = "";
      state.sourceName = sourceName || "";
      state.errorMessage = error.message || "Invalid summary JSON";
      els.clearButton.disabled = false;
      els.sourceName.textContent = state.sourceName ? state.sourceName + ": invalid summary JSON" : "Invalid summary JSON";
      renderMetrics();
      renderTimeline();
      renderSteps();
      renderDetail();
    }

    loadSummary([], "");
  </script>
</body>
</html>
